name: AirTagSync Anisette
version: "1.0.0"
slug: anisette
description: Anisette server — provides Apple-compatible auth headers for the AirTagSync integration. Required because Apple's gateway expects per-request signed headers that normally only Apple devices generate.
arch:
  - amd64
  - aarch64
  - armv7
url: https://github.com/PrayerfulDrop/airtagsync-addon
init: false
hassio_api: false
homeassistant_api: false
host_network: false
ports:
  6969/tcp: 6969
ports_description:
  6969/tcp: Anisette HTTP port — the AirTagSync integration connects here
boot: auto
startup: services
options: {}
schema: {}
